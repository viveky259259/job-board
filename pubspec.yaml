name: job_board
description: "JobHunter AI — Agentic job search, smart matching, AI cover letters, and gamified applications."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.7+1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  timeago: ^3.7.1
  equatable: ^2.0.8
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.13.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
