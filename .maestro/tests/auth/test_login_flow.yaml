appId: com.jobhunter.job_board
env:
  EMAIL: ${TEST_EMAIL:-maestro_test@test.com}
  PASSWORD: ${TEST_PASSWORD:-TestPass123!}
tags:
  - auth
  - login
  - critical
---

# Test: Login with email and reach home screen
- launchApp:
    appId: com.jobhunter.job_board
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible:
      text: "JobHunter AI"
    timeout: 15000

# Fill login form
- tapOn:
    text: "Email"
    index: 0
    label: "Tap email field"
- inputText: ${EMAIL}
- hideKeyboard

- tapOn:
    text: "Password"
    index: 0
    label: "Tap password field"
- inputText: ${PASSWORD}
- hideKeyboard

- takeScreenshot: "login_filled"

- tapOn:
    text: "Sign In with Email"
    label: "Submit login"

# Should navigate to home (Jobs tab)
- extendedWaitUntil:
    visible:
      text: "Jobs"
    timeout: 10000
    label: "Wait for home screen"

- takeScreenshot: "home_screen_after_login"

- assertVisible:
    text: "Jobs"
    label: "Jobs tab visible"
