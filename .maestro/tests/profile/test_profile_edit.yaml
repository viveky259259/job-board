appId: com.jobhunter.job_board
env:
  EMAIL: ${TEST_EMAIL:-maestro_test@test.com}
  PASSWORD: ${TEST_PASSWORD:-TestPass123!}
tags:
  - profile
  - edit
---

# Test: Edit profile — update name and skills
- launchApp:
    appId: com.jobhunter.job_board
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible:
      text: "JobHunter AI"
    timeout: 15000

- runFlow:
    file: ../../helpers/helper_login.yaml

- extendedWaitUntil:
    visible:
      text: "Jobs"
    timeout: 10000

# Navigate to Profile
- tapOn:
    text: "Profile"
    label: "Go to Profile tab"

- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 5000

# Tap Edit button
- tapOn:
    text: "Edit Profile"
    optional: true
    label: "Open profile editor"

- runFlow:
    when:
      visible:
        text: "Edit Profile"
    commands:
      - extendedWaitUntil:
          visible:
            text: "Basic Info"
          timeout: 5000

      - takeScreenshot: "profile_edit_screen"

      # Edit name
      - tapOn:
          text: "Full Name"
          label: "Tap name field"
      - clearText
      - inputText: "Updated Name"
      - hideKeyboard

      # Add a skill
      - scrollUntilVisible:
          element:
            text: "Skills"
          direction: DOWN
          timeout: 3000

      - tapOn:
          text: "Add a skill"
          optional: true
      - inputText: "Testing"
      - hideKeyboard

      - takeScreenshot: "profile_edit_filled"

      # Save
      - tapOn:
          text: "Save"
          label: "Save profile changes"

      - takeScreenshot: "profile_after_save"
