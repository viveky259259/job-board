appId: com.jobhunter.job_board
env:
  EMAIL: ${TEST_EMAIL:-maestro_test@test.com}
  PASSWORD: ${TEST_PASSWORD:-TestPass123!}
tags:
  - settings
---

# Test: Settings screen — verify elements and subscription info
- launchApp:
    appId: com.jobhunter.job_board
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible:
      text: "JobHunter AI"
    timeout: 15000

- runFlow:
    file: ../../helpers/helper_login.yaml

- extendedWaitUntil:
    visible:
      text: "Jobs"
    timeout: 10000

# Navigate to Settings
- tapOn:
    text: "Settings"
    label: "Go to Settings tab"

- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

- takeScreenshot: "settings_screen"

# Check subscription card
- assertVisible:
    text: "FREE"
    optional: true
    label: "Free tier badge visible"

# Check settings items
- assertVisible:
    text: "Notifications"
    label: "Notifications setting visible"

- assertVisible:
    text: "Appearance"
    label: "Appearance setting visible"

- assertVisible:
    text: "Privacy"
    label: "Privacy setting visible"

# Check version
- scrollUntilVisible:
    element:
      text: "JobHunter AI v1.0.0"
    direction: DOWN
    timeout: 3000
- assertVisible:
    text: "JobHunter AI v1.0.0"
    label: "Version visible"

- takeScreenshot: "settings_complete"
