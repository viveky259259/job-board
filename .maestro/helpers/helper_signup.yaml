# Helper: Sign up with email
# Expects to be on the signup screen
- tapOn:
    text: "Sign Up"
    label: "Navigate to signup screen"
- extendedWaitUntil:
    visible:
      text: "Join JobHunter AI"
    timeout: 5000
- tapOn:
    text: "Email"
    index: 0
    label: "Tap email field"
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    text: "Password"
    index: 0
    label: "Tap password field"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    text: "Confirm Password"
    label: "Tap confirm password field"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    text: "Create Account with Email"
    label: "Submit signup form"
